name: Publish mentisdbd Docker image

on:
  push:
    tags:
      # GitHub Actions tag patterns are GLOB, not regex. `*` matches any chars
      # except `/`. These match daemon version tags like `0.9.5` or `v0.9.5`
      # without colliding with `pymentisdb-v*` (which contains a `-`).
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. 0.9.5)'
        required: true
        type: string
      ref:
        description: 'Git ref to build from (defaults to default branch HEAD).'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (resolved ref)
        uses: actions/checkout@v4
        with:
          # On workflow_dispatch with `version=X`, default to checking out the
          # tag `X` (or `vX`) so the published image content matches the tag.
          # Operator can override via the `ref` input. On tag/PR triggers
          # GitHub picks the right ref automatically.
          ref: |
            ${{ inputs.ref
                || (inputs.version && format('refs/tags/{0}', inputs.version))
                || github.ref }}

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading v from tag refs like refs/tags/v0.9.5
            ref="${{ github.ref_name }}"
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute lowercase image name
        id: img
        # Docker/OCI image refs MUST be lowercase. github.repository_owner can
        # contain uppercase chars (e.g. `CloudLLM-ai`), which would fail at
        # tag/push time. Lowercase here once.
        run: |
          owner="${{ github.repository_owner }}"
          echo "image=${owner,,}/mentisdb" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR validation, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (tag / dispatch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Published"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:latest\`"
            echo ""
            echo "### Run"
            echo ""
            echo '```bash'
            echo "docker run -dt --name mentisdbd \\"
            echo "  -p 9471:9471 -p 9472:9472 -p 9475:9475 \\"
            echo "  -v mentisdb-data:/var/lib/mentisdb \\"
            echo "  ${{ env.REGISTRY }}/${{ steps.img.outputs.image }}:${{ steps.ver.outputs.version }}"
            echo '```'
            echo ""
            echo "**Note**: \`-t\` (allocate pseudo-TTY) is required because mentisdbd opens \`/dev/tty\` for TUI init even when run as a daemon."
          } >> "$GITHUB_STEP_SUMMARY"
