name: Publish mentisdbd Docker image

on:
  push:
    tags:
      # Only daemon-version tags (PascalCase semver). Excludes pymentisdb-v*.
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. 0.9.5)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mentisdb

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading v from tag refs like refs/tags/v0.9.5
            ref="${{ github.ref_name }}"
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image summary
        run: |
          {
            echo "## Published"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
            echo ""
            echo "### Run"
            echo ""
            echo '```bash'
            echo "docker run -dt --name mentisdbd \\"
            echo "  -p 9471:9471 -p 9472:9472 -p 9475:9475 \\"
            echo "  -v mentisdb-data:/var/lib/mentisdb \\"
            echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}"
            echo '```'
            echo ""
            echo "**Note**: \`-t\` (allocate pseudo-TTY) is required because mentisdbd 0.9.5 opens \`/dev/tty\` for TUI init even when run as a daemon. Track upstream issue for a \`--headless\` flag that would remove this requirement."
          } >> "$GITHUB_STEP_SUMMARY"
